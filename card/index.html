<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xitij Kaushik — Advocate | Vakeel Street</title>
<meta name="description" content="Xitij Kaushik, Advocate — High Court Uttarakhand, UK/429/13. 13 years at the bar. Legal document drafting for NRIs, from Dubai.">
<meta property="og:title" content="Xitij Kaushik — Advocate">
<meta property="og:description" content="High Court Uttarakhand · UK/429/13 · 13 years at the bar. Vakeel Street — Dubai.">
<meta property="og:image" content="https://vakeelstreet.com/portrait.jpg">
<meta property="og:url" content="https://vakeelstreet.com/card">
<meta property="og:type" content="profile">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: #2C2C2A;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    min-height: 100vh;
  }
  .card-wrap {
    width: 100%;
    max-width: 380px;
    opacity: 0;
    transform: translateY(-24px) scale(1.04);
  }
  .card {
    background: #EDE8DC;
    border-radius: 14px;
    padding: 2.2rem 1.8rem 1.6rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
  }
  .banyan {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    opacity: 0.5;
    pointer-events: none;
  }
  .banyan path {
    fill: none;
    stroke: #8A5A3B;
    stroke-width: 1.6;
    stroke-linecap: round;
  }
  .content { position: relative; text-align: center; padding-top: 2.6rem; }
  .portrait {
    width: 96px; height: 96px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    border: 3px solid #8A5A3B;
    object-fit: cover;
    display: block;
  }
  .name {
    font-size: 32px;
    font-weight: 500;
    color: #2A1E4A;
    letter-spacing: 0.5px;
    clip-path: inset(0 100% 0 0);
  }
  .title {
    font-size: 14px;
    letter-spacing: 3px;
    color: #8A5A3B;
    margin-top: 6px;
    text-transform: uppercase;
  }
  .rule { width: 54px; height: 1px; background: #8A5A3B; margin: 14px auto; }
  .cred { font-size: 15px; color: #4A3826; line-height: 1.65; }
  .hook {
    font-style: italic;
    font-size: 17px;
    color: #2A1E4A;
    margin-top: 1.3rem;
    opacity: 0;
  }
  .actions { position: relative; margin-top: 1.6rem; }
  .save-btn {
    width: 100%;
    background: #4A3826;
    color: #EDE8DC;
    border: none;
    border-radius: 10px;
    padding: 16px 0;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  .save-btn:active { transform: scale(0.98); }
  .links {
    display: flex;
    justify-content: center;
    gap: 26px;
    margin-top: 1.1rem;
  }
  .links a {
    font-size: 15px;
    color: #4A3826;
    text-decoration: none;
  }
  .links a.site { border-bottom: 1px solid #8A5A3B; padding-bottom: 2px; }
  .loc {
    text-align: center;
    font-size: 12px;
    color: #8A5A3B;
    margin-top: 1.2rem;
    letter-spacing: 1px;
  }
  .wa-icon { width: 16px; height: 16px; vertical-align: -3px; margin-right: 5px; }
</style>
</head>
<body>

<div class="card-wrap" id="cardwrap">
  <div class="card">
    <svg class="banyan" viewBox="0 0 360 130" aria-hidden="true">
      <g>
        <path class="root" d="M180 -5 C 176 30, 168 55, 150 78 C 138 94, 120 104, 100 110"/>
        <path class="root" d="M180 -5 C 184 32, 194 58, 212 80 C 226 96, 246 106, 268 111"/>
        <path class="root" d="M180 -5 C 179 40, 176 72, 168 100 C 164 112, 158 120, 150 126"/>
        <path class="root" d="M180 -5 C 182 44, 188 78, 198 104 C 202 114, 208 122, 216 127"/>
        <path class="root" d="M150 78 C 140 86, 126 90, 110 90"/>
        <path class="root" d="M212 80 C 224 88, 240 92, 256 92"/>
        <path class="root" d="M168 100 C 158 106, 144 110, 128 111"/>
        <path class="root" d="M198 104 C 210 110, 226 113, 242 113"/>
      </g>
    </svg>

    <div class="content">
      <img class="portrait" src="/portrait-card.jpg" alt="Xitij Kaushik, Advocate">
      <p class="name" id="inkname">Xitij Kaushik</p>
      <p class="title">Advocate</p>
      <div class="rule"></div>
      <p class="cred">High Court Uttarakhand &middot; UK/429/13<br>13 years at the bar</p>
      <p class="hook" id="hookline">Show me your documents. I will tell you where you stand.</p>
    </div>

    <div class="actions">
      <button class="save-btn" id="savebtn">Save contact</button>
      <div class="links">
        <a class="site" href="https://vakeelstreet.com">vakeelstreet.com</a>
        <a href="https://wa.me/?text=Xitij%20Kaushik%2C%20Advocate%20%E2%80%94%20High%20Court%20Uttarakhand%20%C2%B7%2013%20years%20at%20the%20bar.%20https%3A%2F%2Fvakeelstreet.com%2Fcard">
          <svg class="wa-icon" viewBox="0 0 24 24" fill="none" stroke="#4A3826" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/><path d="M9 10a.5.5 0 0 0 1 0V9a.5.5 0 0 0-1 0v1a5 5 0 0 0 5 5h1a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1"/></svg>Share
        </a>
      </div>
      <p class="loc">DUBAI &middot; UAE</p>
    </div>
  </div>
</div>

<script>
(function () {
  var wrap = document.getElementById('cardwrap');
  var name = document.getElementById('inkname');
  var hook = document.getElementById('hookline');
  var roots = document.querySelectorAll('.root');

  roots.forEach(function (p) {
    var L = p.getTotalLength();
    p.style.strokeDasharray = L;
    p.style.strokeDashoffset = L;
  });

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      wrap.style.transition = 'opacity 1.4s ease-out, transform 1.6s cubic-bezier(0.22,0.8,0.3,1)';
      wrap.style.opacity = 1;
      wrap.style.transform = 'translateY(0) scale(1)';

      roots.forEach(function (p, i) {
        p.style.transition = 'stroke-dashoffset 2.8s ease-out ' + (1.0 + i * 0.28) + 's';
        p.style.strokeDashoffset = 0;
      });

      name.style.transition = 'clip-path 2.6s ease-in-out 2.0s';
      name.style.clipPath = 'inset(0 0% 0 0)';

      hook.style.transition = 'opacity 1.6s ease-in 4.2s';
      hook.style.opacity = 1;
    });
  });

  document.getElementById('savebtn').addEventListener('click', function () {
    var v = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'N:Kaushik;Xitij;;;',
      'FN:Xitij Kaushik',
      'TITLE:Advocate',
      'ORG:Vakeel Street',
      'TEL;TYPE=CELL:+971557353709',
      'EMAIL:vakeelstreet@gmail.com',
      'URL:https://vakeelstreet.com',
      'ADR;TYPE=WORK:;;Dubai;;;;UAE',
      'END:VCARD'
    ].join('\r\n');
    var blob = new Blob([v], { type: 'text/vcard;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Xitij-Kaushik.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
})();
</script>

</body>
</html>
